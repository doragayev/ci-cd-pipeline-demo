name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint code
        run: flake8 .

      - name: Run unit tests
        run: pytest

  docker:
    runs-on: ubuntu-latest
    needs: test   # לא ירוץ אם ה-test נכשל

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ci-cd-demo .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name test-container ci-cd-demo
          sleep 5

      - name: Health check
        run: curl --fail http://localhost:5000

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container
          docker rm test-container